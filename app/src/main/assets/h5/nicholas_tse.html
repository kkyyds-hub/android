<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>谢霆锋音乐资料</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #15161b;
            color: #f8f8f8;
            line-height: 1.58;
        }
        main { padding: 14px; }
        .hero {
            padding: 15px;
            border-radius: 10px;
            background: #202129;
            border: 1px solid rgba(255,255,255,.12);
        }
        .eyebrow {
            color: #ffd36b;
            font-size: 12px;
            font-weight: 700;
        }
        h1 {
            margin: 5px 0 0;
            font-size: 21px;
            letter-spacing: 0;
        }
        .sub {
            margin-top: 7px;
            color: rgba(255,255,255,.74);
            font-size: 13px;
        }
        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-top: 11px;
        }
        .chip {
            padding: 5px 9px;
            border-radius: 999px;
            background: rgba(255,255,255,.1);
            color: rgba(255,255,255,.92);
            font-size: 12px;
        }
        .section {
            margin-top: 12px;
            padding: 13px;
            border-radius: 10px;
            background: rgba(255,255,255,.075);
            border: 1px solid rgba(255,255,255,.08);
        }
        h2 {
            margin: 0 0 8px;
            font-size: 16px;
        }
        p {
            margin: 0;
            color: rgba(255,255,255,.82);
            font-size: 13px;
        }
        .order {
            display: grid;
            gap: 8px;
        }
        .song {
            display: grid;
            grid-template-columns: 24px 1fr;
            gap: 9px;
            align-items: start;
        }
        .num {
            width: 24px;
            height: 24px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            background: rgba(255,211,107,.18);
            color: #ffd36b;
            font-size: 12px;
            font-weight: 800;
        }
        .title {
            color: #fff;
            font-size: 14px;
            font-weight: 700;
        }
        .desc {
            margin-top: 2px;
            color: rgba(255,255,255,.7);
            font-size: 12px;
        }
        .keywords {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .keyword {
            padding: 10px;
            min-height: 58px;
            border-radius: 8px;
            background: rgba(255,255,255,.08);
            border-left: 3px solid #6ee7d8;
        }
        .keyword b {
            display: block;
            font-size: 13px;
        }
        .keyword small {
            display: block;
            margin-top: 3px;
            color: rgba(255,255,255,.68);
            font-size: 11px;
        }
    </style>
</head>
<body>
<main>
    <div class="hero">
        <div class="eyebrow">MOON MUSIC · 音乐资料</div>
        <h1>谢霆锋聆听指南</h1>
        <div class="sub">按“入门、现场、粤语辨识度”的顺序，更容易听出他的音乐气质。</div>
        <div class="chips">
            <span class="chip">流行摇滚</span>
            <span class="chip">Viva Live</span>
            <span class="chip">粤语作品</span>
            <span class="chip">舞台感</span>
        </div>
    </div>

    <section class="section">
        <h2>推荐聆听顺序</h2>
        <div class="order">
            <div class="song">
                <div class="num">1</div>
                <div>
                    <div class="title">因为爱所以爱</div>
                    <div class="desc">旋律直接，适合作为谢霆锋音乐的第一入口。</div>
                </div>
            </div>
            <div class="song">
                <div class="num">2</div>
                <div>
                    <div class="title">活着Viva</div>
                    <div class="desc">舞台张力强，能听到更外放的摇滚表达。</div>
                </div>
            </div>
            <div class="song">
                <div class="num">3</div>
                <div>
                    <div class="title">玉蝴蝶</div>
                    <div class="desc">粤语旋律辨识度高，适合作为代表作品继续听。</div>
                </div>
            </div>
        </div>
    </section>

    <section class="section">
        <h2>音乐关键词</h2>
        <div class="keywords">
            <div class="keyword"><b>现场能量</b><small>Viva Live 的冲击力</small></div>
            <div class="keyword"><b>粤语经典</b><small>旋律和咬字辨识度</small></div>
            <div class="keyword"><b>早期锋利感</b><small>直接、年轻、外放</small></div>
            <div class="keyword"><b>流行摇滚</b><small>旋律与节奏并重</small></div>
        </div>
    </section>
</main>
</body>
</html>
